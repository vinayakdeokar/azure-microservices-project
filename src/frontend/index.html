<script>
fetch("http://product-api-service/products")
.then(res => res.json())
.then(data => {
  let html = "";
  data.forEach(p => {
    html += `
      <div>
        <h3>${p.name}</h3>
        <p>${p.price}</p>
        <button onclick="buy('${p.name}', ${p.price})">Buy</button>
      </div>
    `;
  });
  document.getElementById("products").innerHTML = html;
});

function buy(name, price){
  fetch("http://order-api-service/order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({product:name, price:price})
  })
}
</script>
