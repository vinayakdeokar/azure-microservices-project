trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'my-azure-connection'
  acrLoginServer: 'vinayakprojectacr.azurecr.io'
  resourceGroup: 'vinayak-project-rg'
  aksCluster: 'vinayak-aks-cluster'

stages:
# STAGE 1: Infrastructure (Terraform)
- stage: Infra
  displayName: 'Provision Infrastructure'
  jobs:
  - job: Terraform
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'
    - task: TerraformTaskV4@4
      displayName: 'Terraform Init & Apply'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/infrastructure'
        backendServiceArm: '$(azureServiceConnection)'
        backendAzureRmResourceGroupName: 'tfstate-rg' 
        backendAzureRmStorageAccountName: 'vinayaktfstorage'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'terraform.tfstate'
    - task: TerraformTaskV4@4
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/infrastructure'
        environmentServiceNameAzureRM: '$(azureServiceConnection)'
        commandOptions: '-auto-approve'

# STAGE 2: Build & Push Images (4 Containers)
- stage: Build
  displayName: 'Build and Push Images'
  dependsOn: Infra
  jobs:
  - job: BuildImages
    steps:
    - task: Docker@2
      displayName: 'Build Frontend'
      inputs:
        command: buildAndPush
        repository: 'frontend'
        dockerfile: 'src/frontend/Dockerfile'
        containerRegistry: '$(azureServiceConnection)' # ACR Service Connection
        tags: 'latest'
    
    - task: Docker@2
      displayName: 'Build User API'
      inputs:
        command: buildAndPush
        repository: 'user-api'
        dockerfile: 'src/user-api/Dockerfile'
        containerRegistry: '$(azureServiceConnection)'
        tags: 'latest'

    # (Same steps for Product-API and Order-API)

# STAGE 3: Deploy to AKS
- stage: Deploy
  displayName: 'Deploy to Kubernetes'
  dependsOn: Build
  jobs:
  - job: Deploy
    steps:
    - task: KubernetesManifest@0
      displayName: 'Apply Manifests'
      inputs:
        action: deploy
        kubernetesServiceConnection: 'my-aks-connection'
        manifests: 'kube/deployment.yaml'
