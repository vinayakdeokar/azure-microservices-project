parameters:
- name: environment
  displayName: Select Environment
  type: string
  default: dev
  values:
  - dev
  - qa
  - uat
- name: action
  displayName: Select Action
  type: string
  default: Apply
  values:
  - Apply
  - Destroy

trigger: none
pr: none

pool:
  name: Default

variables:
  environment: ${{ parameters.environment }}
  action: ${{ parameters.action }}
  azureServiceConnection: 'sc-ecom-azure-001'

stages:
- stage: Terraform
  displayName: 'Terraform ${{ parameters.action }} - ${{ parameters.environment }}'
  jobs:
  - job: TerraformDeployment
    steps:
    - task: TerraformInstaller@0
      inputs:
        terraformVersion: latest
        
    - task: AzureCLI@2
      displayName: 'Terraform Format Check'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          terraform fmt -check

    - task: AzureCLI@2
      displayName: 'Terraform Init'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          terraform init -backend-config="environments/primary_canada_central/backend_configs/$(environment)-backend.conf"

    - task: AzureCLI@2
      displayName: 'Terraform Validate'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          terraform validate

    - task: AzureCLI@2
      displayName: 'Terraform Plan'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          if ('${{ parameters.action }}' -eq 'Destroy') {
            terraform plan -destroy -var-file="environments/primary_canada_central/tfvars/$(environment).tfvars" -out=tfplan
          } else {
            terraform plan -var-file="environments/primary_canada_central/tfvars/$(environment).tfvars" -out=tfplan
          }

    - task: AzureCLI@2
      displayName: 'Terraform Apply'
      condition: eq('${{ parameters.action }}', 'Apply')
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          terraform apply -auto-approve tfplan

    - task: AzureCLI@2
      displayName: 'Post-Deployment: K8s Core Setup'
      condition: and(succeeded(), eq('${{ parameters.action }}', 'Apply'))
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # 1. Get AKS Credentials
          az aks get-credentials --resource-group ecom-rg-$(environment)-canadacentral --name ecom-aks-cluster-$(environment)-001 --overwrite-existing
          
          # 2. Install Cert-Manager (if not exists)
          $certManagerFound = kubectl get ns cert-manager --ignore-not-found
          if (-not $certManagerFound) {
            Write-Host "Installing Cert-Manager..."
            kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.yaml
            Write-Host "Waiting for Cert-Manager pods to be ready..."
            Start-Sleep -Seconds 60
          }

          # 3. Apply ClusterIssuer
          Write-Host "Applying ClusterIssuer..."
          kubectl apply -f kube/cluster-issurer.yaml --validate=false

          # 4. Update Duck DNS from AKS to Bypass Local Network Issues
          Write-Host "Fetching Application Gateway Public IP..."
          $appgwIp = az network public-ip show --resource-group "ecom-rg-$(environment)-canadacentral" --name "appgw-public-ip" --query ipAddress -o tsv
          $duckdnsDomain = "ecom-$(environment)-vd"
          $duckdnsToken = "161c59c4-994e-4722-b690-3cb6a01da8e7"
          $duckdnsUrl = "https://www.duckdns.org/update?domains=$duckdnsDomain&token=$duckdnsToken&ip=$appgwIp"
          
          Write-Host "Updating Duck DNS via temporary pod inside AKS cluster (Bypassing Local DNS)..."
          kubectl run duckdns-updater --image=curlimages/curl:latest --restart=Never --rm -i -- -s $duckdnsUrl


    - task: AzureCLI@2
      displayName: 'Terraform Destroy'
      condition: eq('${{ parameters.action }}', 'Destroy')
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          terraform apply -auto-approve tfplan