parameters:
- name: environment
  displayName: Select Environment
  type: string
  default: dev
  values:
  - dev
  - qa
  - uat

trigger: none
pr: none

pool:
  name: Default

variables:
  environment: ${{ parameters.environment }}
  azureServiceConnection: 'sc-ecom-azure-001'

stages:
- stage: Terraform
  displayName: Deploy Infrastructure
  jobs:
  - job: TerraformDeployment
    steps:
    - task: TerraformInstaller@0
      inputs:
        terraformVersion: latest
        
    - task: AzureCLI@2
      displayName: 'Terraform Format Check'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          terraform fmt -check

    - task: AzureCLI@2
      displayName: 'Terraform Init'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          terraform init -backend-config="environments/primary_canada_central/backend_configs/$(environment)-backend.conf"

    - task: AzureCLI@2
      displayName: 'Terraform Validate'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          terraform validate

    - task: AzureCLI@2
      displayName: 'Terraform Plan'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          terraform plan -var-file="environments/primary_canada_central/tfvars/$(environment).tfvars" -out=tfplan

    - task: AzureCLI@2
      displayName: 'Terraform Apply'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          terraform apply -auto-approve tfplan