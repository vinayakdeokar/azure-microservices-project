<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinayak Store | Official Amazon Edition</title>

<style>

/* Amazon Theme */

body{
font-family:'Segoe UI',Arial;
margin:0;
background:#f3f3f3;
}

/* Header */

header{
background:#131921;
padding:10px 30px;
display:flex;
flex-direction:column;
gap:10px;
}

.header-main{
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
margin:0;
font-size:24px;
color:#ff9900;
}

.search-box{
display:flex;
flex:1;
margin:0 40px;
}

.search-box input{
width:100%;
padding:10px;
border:none;
border-radius:4px 0 0 4px;
}

.search-box button{
background:#febd69;
border:none;
padding:10px 20px;
border-radius:0 4px 4px 0;
cursor:pointer;
}

.nav-links button{
background:none;
border:1px solid #fff;
color:white;
padding:8px 15px;
cursor:pointer;
border-radius:4px;
}

/* Products */

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:25px;
padding:40px;
max-width:1400px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:8px;
border:1px solid #ddd;
display:flex;
flex-direction:column;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
margin-bottom:15px;
}

.card h3{
font-size:18px;
margin:0 0 10px;
color:#007185;
}

.rating{
color:#ffa41c;
font-size:14px;
margin-bottom:8px;
}

.price{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.buy-btn{
padding:10px;
background:#ffd814;
border:1px solid #fcd200;
border-radius:20px;
cursor:pointer;
}

.buy-btn:hover{
background:#f7ca00;
}

</style>
</head>

<body>

<header>

<div class="header-main">

<h1>Vinayak.store</h1>

<div class="search-box">
<input type="text" id="search-input" placeholder="Search Electronics, Laptops, Phones..." onkeyup="filterItems()">
<button>🔍</button>
</div>

<div class="nav-links">
<button>Register</button>
<button>Sign In</button>
</div>

</div>

</header>

<div class="container" id="product-container"></div>

<script>

let allProducts=[];

/* Render Products */

function showItems(list){

const container=document.getElementById("product-container");

container.innerHTML=list.map(p=>`

<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="rating">${p.stars}</div>
<div class="price">₹${p.price.toLocaleString()}</div>
<button class="buy-btn">Buy Now</button>
</div>

`).join("");

}

/* Search */

function filterItems(){

const query=document.getElementById("search-input").value.toLowerCase();

const filtered=allProducts.filter(p=>
p.name.toLowerCase().includes(query)
);

showItems(filtered);

}

/* Load MongoDB Products */

async function loadProducts(){

try{

const res=await fetch("/products");

const data=await res.json();

allProducts=data.map((p,i)=>({
id:i,
name:p.name,
price:p.price,
img:p.image,
stars:"⭐⭐⭐⭐"
}));

showItems(allProducts);

}catch(err){

console.log("API error:",err);

}

}

window.onload=loadProducts;

</script>

</body>
</html>
